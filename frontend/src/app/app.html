<h1>Users</h1>

<h3>Add user</h3>

<input [(ngModel)]="newUser.name" placeholder="name">
<input [(ngModel)]="newUser.age" placeholder="age" type="number">

<button (click)="addUser()">Add</button>
<button (click)="saveUser()">Save</button>

<hr>

<table border="1" cellpadding="8">
  <thead>
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Key</th>
    <th>Actions</th>
  </tr>
  </thead>

  <tbody>

  <tr *ngFor="let u of users">
    <td>{{ u.name }}</td>
    <td>{{ u.age ?? '—' }}</td>
    <td>{{ u.key }}</td>

    <td>
      <button (click)="deleteUser(u.key)">Delete</button>
      <button (click)="editUser(u)">Edit</button>
    </td>
  </tr>
  </tbody>
</table>
