<h1>Users</h1>

<h3>Add user</h3>

<input [(ngModel)]="newUser.name" placeholder="name">
<input [(ngModel)]="newUser.age" placeholder="age" type="number">

<button (click)="addUser()">Add</button>

<hr>

<table border="1" cellpadding="8">
  <thead>
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Key</th>
  </tr>
  </thead>


  <tbody>

  <tr *ngFor="let u of users">
    <td>{{ u.name }}</td>
    <td>{{ u.age ?? '—' }}</td>
    <td>{{ u.key }}</td>
  </tr>
  </tbody>
</table>
